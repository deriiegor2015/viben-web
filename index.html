<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Viben</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #4CAF50; }
    .section { margin-bottom: 30px; }
    textarea { width: 100%; height: 100px; margin-top: 10px; }
    button { margin-top: 10px; padding: 8px 16px; }
  </style>
</head>
<body>
  <h1>Ласкаво просимо до Viben!</h1>

  <div class="section">
    <h2>Правила</h2>
    <ul>
      <li>Будь ввічливим та поважай інших.</li>
      <li>Не поширюй спам чи образливий контент.</li>
      <li>Дотримуйся законів та етичних норм.</li>
      <li>Пам’ятай: Viben — це простір для позитиву.</li>
    </ul>
  </div>

  <div class="section">
    <h2>Напиши своє питання або пропозицію</h2>
    <form>
      <label for="message">Твоє повідомлення:</label><br>
      <textarea id="message" name="message" placeholder="Введи тут своє питання або пропозицію..."></textarea><br>
      <button type="submit">Надіслати</button>
    </form>
  </div>
</body>
</html>
